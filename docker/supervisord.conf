[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:api]
command=uvicorn sentinel.api.main:app --host 0.0.0.0 --port 8000
directory=/app
environment=PYTHONPATH="/app",DATABASE_URL="%(ENV_DATABASE_URL)s"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:dashboard]
command=streamlit run sentinel/dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
directory=/app
environment=PYTHONPATH="/app",DATABASE_URL="%(ENV_DATABASE_URL)s"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
